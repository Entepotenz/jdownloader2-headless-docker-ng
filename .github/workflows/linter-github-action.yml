---
name: ✅ Check for Linting GitHub Action

# yamllint disable-line rule:truthy
on:
  push:
    paths:
      - .github/**.yml
      - .github/**.yaml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  lint-github-actions:
    name: 🔍 Run GitHub Action Linter
    runs-on: ubuntu-latest
    if: (!startsWith(github.event.pull_request.head.ref, 'dependabot/') && !startsWith(github.event.pull_request.head.ref, 'renovate/') && github.event.head_commit.author.username != 'renovate-bot')
    steps:
      - name: 🛠 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🔍 Run actionlint
        uses: docker://rhysd/actionlint:1.7.11@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f
        with:
          args: -color
